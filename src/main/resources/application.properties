spring.application.name=Board

# Oracle + log4jdbc
#spring.datasource.hikari.driver-class-name=net.sf.log4jdbc.sql.jdbcapi.DriverSpy
spring.datasource.hikari.driver-class-name=com.p6spy.engine.spy.P6SpyDriver
spring.datasource.hikari.jdbc-url=jdbc:p6spy:oracle:thin:@localhost:1521:XE
spring.datasource.hikari.username=system
spring.datasource.hikari.password=oracle

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000

# MyBatis \uC124\uC815
mybatis.configuration.map-underscore-to-camel-case=true

# Hibernate (JPA) \uC124\uC815
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

logging.level.root=INFO
logging.level.com.study.interceptor=DEBUG

# change upload file size
spring.servlet.multipart.maxFileSize=10MB
spring.servlet.multipart.maxRequestSize=50MB
